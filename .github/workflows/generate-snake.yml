name: Generate Animations

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ThiagoBianna
          outputs: |
            dist/pacman-contribution-graph.svg?palette=github-light&theme=pacman
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&theme=pacman
            dist/languages.svg
            
      - name: push outputs to separate branches
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
